document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }

  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

gin-bottom: 6px;\n  }\n  .saved-hint {\n    margin-left: 6px;\n    font-size: 9px;\n    letter-spacing: 0.12em;\n    color: var(--burgundy);\n    opacity: 0;\n    transition: opacity 0.2s;\n  }\n  .saved-hint.flash { opacity: 0.7; }\n  .field input[type=\"text\"],\n  .field input[type=\"number\"],\n  .field textarea {\n    width: 100%;\n    padding: 10px 12px;\n    border: 1px solid #00000018;\n    background: #FBF7EC;\n    font-family: system-ui, sans-serif;\n    font-size: 14px;\n    color: var(--ink);\n    border-radius: 0;\n    outline: none;\n    transition: border-color 0.15s;\n  }\n  .field input:focus,\n  .field textarea:focus { border-color: var(--burgundy); }\n  .field textarea { resize: none; min-height: 60px; }\n\n  .drop {\n    width: 100%;\n    border: 1.5px dashed #00000028;\n    background: #FBF7EC;\n    padding: 22px 16px;\n    text-align: center;\n    cursor: pointer;\n    transition: all 0.15s;\n  }\n  .drop.has-photo {\n    padding: 8px;\n  }\n  .drop.has-photo img {\n    width: 100%;\n    aspect-ratio: 9 / 16;\n    object-fit: cover;\n    display: block;\n  }\n  .drop:hover { border-color: var(--burgundy); background: #FFF; }\n  .drop.dragging { border-color: var(--burgundy); background: #F2E6CE40; }\n  .drop .icon {\n    font-size: 28px;\n    color: var(--burgundy);\n    margin-bottom: 4px;\n  }\n  .drop .label {\n    color: var(--ink);\n    font-size: 13px;\n  }\n  .drop .hint {\n    font-family: \"DM Mono\", monospace;\n    font-size: 10px;\n    color: var(--burgundy);\n    opacity: 0.7;\n    margin-top: 4px;\n  }\n  input[type=\"file\"] { display: none; }\n\n  .actions {\n    margin-top: 28px;\n    border-top: 1px solid #00000010;\n    padding-top: 24px;\n  }\n  .btn {\n    width: 100%;\n    padding: 14px 18px;\n    background: var(--burgundy);\n    color: var(--cream);\n    border: none;\n    font-family: \"DM Mono\", monospace;\n    font-size: 12px;\n    font-weight: 600;\n    letter-spacing: 0.22em;\n    cursor: pointer;\n    transition: background 0.15s;\n  }\n  .btn:hover { background: var(--burgundy-deep); }\n  .btn:disabled { background: #00000022; color: #00000060; cursor: not-allowed; }\n\n  .btn-secondary {\n    background: transparent;\n    color: var(--burgundy);\n    border: 1px solid var(--burgundy);\n    margin-top: 8px;\n  }\n  .btn-secondary:hover { background: var(--burgundy); color: var(--cream); }\n\n  .help {\n    margin-top: 24px;\n    padding: 14px 16px;\n    background: var(--cream);\n    font-size: 12px;\n    line-height: 1.55;\n    color: var(--ink);\n  }\n  .help b { color: var(--burgundy); }\n\n  /* STAGE */\n  .stage {\n    background: #2b2b2b;\n    background-image:\n      radial-gradient(circle at 1px 1px, rgba(255,255,255,0.06) 1px, transparent 0);\n    background-size: 24px 24px;\n    padding: 32px;\n    display: flex;\n    align-items: center;\n    justify-content: center;\n    overflow: hidden;\n    height: 100vh;\n  }\n  .preview-wrap {\n    width: 1080px;\n    height: 1920px;\n    transform-origin: center center;\n    transform: scale(0.4);\n    flex-shrink: 0;\n  }\n\n  /* PREVIEW (real 1080x1920) */\n  .preview {\n    width: 1080px;\n    height: 1920px;\n    position: relative;\n    background: #1a1a1a;\n    overflow: hidden;\n    box-shadow: 0 30px 80px rgba(0,0,0,0.6);\n  }\n  .preview .photo {\n    position: absolute;\n    inset: 0;\n    object-fit: cover;\n    width: 100%;\n    height: 100%;\n  }\n  .preview .photo-placeholder {\n    position: absolute;\n    inset: 0;\n    display: flex;\n    flex-direction: column;\n    align-items: center;\n    justify-content: center;\n    color: #666;\n    font-family: \"DM Mono\", monospace;\n    font-size: 24px;\n    letter-spacing: 0.2em;\n    background:\n      repeating-linear-gradient(\n        45deg,\n        #1a1a1a,\n        #1a1a1a 20px,\n        #222 20px,\n        #222 40px\n      );\n  }\n\n  .preview .pill {\n    position: absolute;\n    top: 180px;\n    right: 54px;\n    background: var(--burgundy);\n    color: var(--cream);\n    padding: 24px 42px;\n    font-family: \"DM Mono\", monospace;\n    font-size: 32px;\n    letter-spacing: 0.22em;\n    font-weight: 600;\n    line-height: 1;\n  }\n\n  .preview .block {\n    position: absolute;\n    left: 66px;\n    bottom: 110px;\n    background: var(--burgundy);\n    color: var(--cream);\n    padding: 36px 48px 38px;\n    max-width: 800px;\n    width: max-content;\n    display: flex;\n    flex-direction: column;\n  }\n  .preview .dish-wrap {\n    /* Wraps long names without breaking individual words */\n    overflow-wrap: break-word;\n  }\n  .preview .tagline {\n    font-family: \"DM Mono\", monospace;\n    font-size: 24px;\n    letter-spacing: 0.28em;\n    color: var(--cream);\n    opacity: 0.85;\n    font-weight: 600;\n    padding-bottom: 22px;\n    margin-bottom: 22px;\n    border-bottom: 2px solid rgba(242,230,206,0.4);\n  }\n  .preview .dish {\n    font-family: \"Playfair Display\", Georgia, serif;\n    font-size: 64px;\n    line-height: 1.08;\n    font-weight: 600;\n    color: var(--cream);\n    letter-spacing: -0.005em;\n  }\n\n  /* Toast */\n  .toast {\n    position: fixed;\n    bottom: 24px;\n    left: 50%;\n    transform: translateX(-50%) translateY(20px);\n    background: var(--burgundy);\n    color: var(--cream);\n    padding: 12px 20px;\n    font-family: \"DM Mono\", monospace;\n    font-size: 11px;\n    letter-spacing: 0.18em;\n    opacity: 0;\n    pointer-events: none;\n    transition: all 0.25s;\n    z-index: 100;\n  }\n  .toast.show {\n    opacity: 1;\n    transform: translateX(-50%) translateY(0);\n  }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n<div class=\"app\">\n\n  <aside class=\"panel\">\n    <h1>Story Maker<\u002Fh1>\n    <div class=\"sub\" id=\"subEl\">VET- EN KOOKDEGEN<\u002Fdiv>\n\n    <div class=\"field\">\n      <label for=\"opleiding\">Naam opleiding\n        <span class=\"saved-hint\" id=\"savedHint\">— opgeslagen<\u002Fspan>\n      <\u002Flabel>\n      <input type=\"text\" id=\"opleiding\" value=\"VET- EN KOOKDEGEN\" maxlength=\"40\">\n    <\u002Fdiv>\n\n    <div class=\"field\">\n      <label for=\"photo\">Foto van je gerecht<\u002Flabel>\n      <label class=\"drop\" id=\"drop\" for=\"photo\">\n        <div class=\"placeholder\">\n          <div class=\"icon\">📷<\u002Fdiv>\n          <div class=\"label\">Klik of sleep een foto hier<\u002Fdiv>\n          <div class=\"hint\">JPG OF PNG — STAANDE FOTO BEST<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Flabel>\n      <input type=\"file\" id=\"photo\" accept=\"image/*\">\n    <\u002Fdiv>\n\n    <div class=\"field\">\n      <label for=\"lesson\">Lesnummer<\u002Flabel>\n      <input type=\"text\" id=\"lesson\" value=\"14\" maxlength=\"3\">\n    <\u002Fdiv>\n\n    <div class=\"field\">\n      <label for=\"dish\">Naam gerecht<\u002Flabel>\n      <textarea id=\"dish\" rows=\"2\">Aardbeientartelettes<\u002Ftextarea>\n    <\u002Fdiv>\n\n    <div class=\"actions\">\n      <button class=\"btn\" id=\"download\">⬇  DOWNLOAD ALS PNG<\u002Fbutton>\n      <button class=\"btn btn-secondary\" id=\"reset\">RESET<\u002Fbutton>\n    <\u002Fdiv>\n\n    <div class=\"help\">\n      <b>Hoe gebruiken:<\u002Fb><br>\n      1. Vul één keer je opleiding in (wordt onthouden)<br>\n      2. Foto erin slepen<br>\n      3. Lesnummer en gerechtnaam invullen<br>\n      4. Download knop → PNG verschijnt in je downloads<br>\n      5. Upload naar Instagram als story\n      <br><br>\n      <b>Tip:<\u002Fb> sla deze pagina op als bladwijzer op je telefoon — werkt overal, ook offline.\n    <\u002Fdiv>\n  <\u002Faside>\n\n  <main class=\"stage\">\n    <div class=\"preview-wrap\" id=\"previewWrap\">\n      <div class=\"preview\" id=\"preview\">\n        <div class=\"photo-placeholder\" id=\"placeholder\">FOTO HIER<\u002Fdiv>\n        <div class=\"pill\" id=\"pill\">LES · 14<\u002Fdiv>\n        <div class=\"block\">\n          <div class=\"tagline\" id=\"taglineEl\">VET- EN KOOKDEGEN<\u002Fdiv>\n          <div class=\"dish\" id=\"dishEl\">Aardbeientartelettes<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fmain>\n\n<\u002Fdiv>\n\n<div class=\"toast\" id=\"toast\">PNG GEDOWNLOAD<\u002Fdiv>\n\n<script>\nconst photoInput = document.getElementById('photo');\nconst drop = document.getElementById('drop');\nconst placeholder = document.getElementById('placeholder');\nlet photoImg = null;\nconst opleidingInput = document.getElementById('opleiding');\nconst lessonInput = document.getElementById('lesson');\nconst dishInput = document.getElementById('dish');\nconst pillEl = document.getElementById('pill');\nconst dishEl = document.getElementById('dishEl');\nconst taglineEl = document.getElementById('taglineEl');\nconst subEl = document.getElementById('subEl');\nconst savedHint = document.getElementById('savedHint');\nconst downloadBtn = document.getElementById('download');\nconst resetBtn = document.getElementById('reset');\nconst preview = document.getElementById('preview');\nconst previewWrap = document.getElementById('previewWrap');\nconst toast = document.getElementById('toast');\n\nconst STORAGE_KEY = 'storyMaker.settings.v1';\n\nfunction loadSettings() {\n  try {\n    return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};\n  } catch { return {}; }\n}\nfunction saveSettings(patch) {\n  const current = loadSettings();\n  const next = { ...current, ...patch };\n  localStorage.setItem(STORAGE_KEY, JSON.stringify(next));\n  flashSavedHint();\n}\nlet savedHintTimer = null;\nfunction flashSavedHint() {\n  if (!savedHint) return;\n  savedHint.classList.add('flash');\n  clearTimeout(savedHintTimer);\n  savedHintTimer = setTimeout(() => savedHint.classList.remove('flash'), 1200);\n}\n\nlet currentPhoto = null; // dataURL\n\nfunction updateLesson() {\n  const n = (lessonInput.value || '').replace(/\\D/g, '') || '14';\n  const padded = n.length < 2 ? n.padStart(2, '0') : n;\n  pillEl.textContent = `LES · ${padded}`;\n}\n\nfunction updateDish() {\n  dishEl.textContent = dishInput.value || 'Naam gerecht';\n}\n\nfunction updateOpleiding() {\n  const v = (opleidingInput.value || 'NAAM OPLEIDING').toUpperCase();\n  taglineEl.textContent = v;\n  subEl.textContent = v;\n}\n\nfunction setPhoto(dataUrl) {\n  currentPhoto = dataUrl;\n  if (dataUrl) {\n    if (!photoImg) {\n      photoImg = document.createElement('img');\n      photoImg.className = 'photo';\n      photoImg.alt = '';\n      preview.insertBefore(photoImg, placeholder.nextSibling);\n    }\n    photoImg.src = dataUrl;\n    placeholder.style.display = 'none';\n  } else {\n    if (photoImg && photoImg.parentNode) {\n      photoImg.parentNode.removeChild(photoImg);\n      photoImg = null;\n    }\n    placeholder.style.display = 'flex';\n  }\n}\n\nfunction handleFile(file) {\n  if (!file || !file.type.startsWith('image/')) return;\n  const reader = new FileReader();\n  reader.onload = (e) => setPhoto(e.target.result);\n  reader.readAsDataURL(file);\n}\n\nphotoInput.addEventListener('change', (e) => {\n  if (e.target.files[0]) handleFile(e.target.files[0]);\n});\n\ndrop.addEventListener('dragover', (e) => {\n  e.preventDefault();\n  drop.classList.add('dragging');\n});\ndrop.addEventListener('dragleave', () => drop.classList.remove('dragging'));\ndrop.addEventListener('drop', (e) => {\n  e.preventDefault();\n  drop.classList.remove('dragging');\n  if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);\n});\n\nlessonInput.addEventListener('input', () => {\n  updateLesson();\n  saveSettings({ lesson: lessonInput.value });\n});\ndishInput.addEventListener('input', updateDish);\nopleidingInput.addEventListener('input', () => {\n  updateOpleiding();\n  saveSettings({ opleiding: opleidingInput.value });\n});\n\nresetBtn.addEventListener('click', () => {\n  // Reset only the per-story fields; keep opleiding (saved setting)\n  lessonInput.value = '01';\n  dishInput.value = '';\n  setPhoto(null);\n  updateLesson(); updateDish();\n  saveSettings({ lesson: lessonInput.value });\n});\n\n// Fit preview to available stage area\nfunction fitPreview() {\n  const stage = previewWrap.parentElement;\n  const padding = 64;\n  // Use bounding rect for accurate visible area\n  const rect = stage.getBoundingClientRect();\n  const availW = Math.max(200, rect.width - padding);\n  const availH = Math.max(200, rect.height - padding);\n  const scale = Math.min(availW / 1080, availH / 1920);\n  previewWrap.style.transform = `scale(${scale})`;\n  previewWrap.style.width = '1080px';\n  previewWrap.style.height = '1920px';\n  const dx = (1080 - 1080 * scale) / 2;\n  const dy = (1920 - 1920 * scale) / 2;\n  previewWrap.style.margin = `${-dy}px ${-dx}px`;\n}\nwindow.addEventListener('resize', fitPreview);\n\n// Download — Canvas-native rendering (no html-to-image)\nasync function ensureFontsLoaded() {\n  if (!document.fonts) return;\n  const specs = [\n    '600 64px \"Playfair Display\"',\n    '600 54px \"Playfair Display\"',\n    '600 44px \"Playfair Display\"',\n    '600 36px \"Playfair Display\"',\n    '600 32px \"DM Mono\"',\n    '600 24px \"DM Mono\"',\n  ];\n  try {\n    await Promise.all(specs.map(s => document.fonts.load(s)));\n  } catch (e) { /* ignore */ }\n  await document.fonts.ready;\n}\n\nfunction loadImageAsync(src) {\n  return new Promise((resolve, reject) => {\n    const img = new Image();\n    img.onload = () => resolve(img);\n    img.onerror = reject;\n    img.src = src;\n  });\n}\n\nfunction drawCover(ctx, img, dx, dy, dw, dh) {\n  const ir = img.width / img.height;\n  const dr = dw / dh;\n  let sx, sy, sw, sh;\n  if (ir > dr) {\n    sh = img.height; sw = sh * dr;\n    sx = (img.width - sw) / 2; sy = 0;\n  } else {\n    sw = img.width; sh = sw / dr;\n    sx = 0; sy = (img.height - sh) / 2;\n  }\n  ctx.drawImage(img, sx, sy, sw, sh, dx, dy, dw, dh);\n}\n\nfunction wrapText(ctx, text, maxWidth) {\n  const words = text.split(/\\s+/).filter(Boolean);\n  if (!words.length) return [''];\n  const lines = [];\n  let line = '';\n  for (const word of words) {\n    const test = line ? line + ' ' + word : word;\n    if (ctx.measureText(test).width <= maxWidth) {\n      line = test;\n    } else {\n      if (line) lines.push(line);\n      line = word;\n    }\n  }\n  if (line) lines.push(line);\n  return lines;\n}\n\nasync function download() {\n  downloadBtn.disabled = true;\n  downloadBtn.textContent = 'BEZIG MET RENDEREN…';\n  try {\n    await ensureFontsLoaded();\n    await new Promise(r => setTimeout(r, 100));\n\n    // === BUILD CANVAS ===\n    const W = 1080, H = 1920;\n    const canvas = document.createElement('canvas');\n    canvas.width = W; canvas.height = H;\n    const ctx = canvas.getContext('2d');\n\n    // Background\n    ctx.fillStyle = '#1a1a1a';\n    ctx.fillRect(0, 0, W, H);\n\n    // Photo (full bleed, cover-fit)\n    if (currentPhoto) {\n      try {\n        const img = await loadImageAsync(currentPhoto);\n        drawCover(ctx, img, 0, 0, W, H);\n      } catch (e) {\n        /* fall through to placeholder */\n      }\n    } else {\n      // Diagonal stripe placeholder\n      ctx.fillStyle = '#222';\n      const stripe = 60;\n      for (let i = -H; i < W + H; i += stripe * 2) {\n        ctx.beginPath();\n        ctx.moveTo(i, 0);\n        ctx.lineTo(i + stripe, 0);\n        ctx.lineTo(i + stripe + H, H);\n        ctx.lineTo(i + H, H);\n        ctx.closePath();\n        ctx.fill();\n      }\n    }\n\n    const BURGUNDY = '#6B1D2A';\n    const CREAM = '#F2E6CE';\n\n    // === LES PILL (top-right) ===\n    const pillText = pillEl.textContent;\n    ctx.font = '600 32px \"DM Mono\", ui-monospace, monospace';\n    ctx.letterSpacing = '0.22em';\n    const pillTextW = ctx.measureText(pillText).width;\n    const pillH = 80; // 32 line-height + 24*2 padding\n    const pillW = Math.ceil(pillTextW + 84); // 42*2 padding\n    const pillX = W - 54 - pillW;\n    const pillY = 180;\n    ctx.fillStyle = BURGUNDY;\n    ctx.fillRect(pillX, pillY, pillW, pillH);\n    ctx.fillStyle = CREAM;\n    ctx.textBaseline = 'middle';\n    ctx.textAlign = 'left';\n    ctx.fillText(pillText, pillX + 42, pillY + pillH / 2);\n\n    // === BOTTOM BLOCK ===\n    const blockLeft = 66;\n    const padX = 48, padTop = 36, padBot = 38;\n    const blockMaxW = 920; // hard cap to keep within frame\n    const blockMaxContentW = blockMaxW - padX * 2; // 824\n\n    // Measure tagline (with letter-spacing)\n    const taglineText = taglineEl.textContent;\n    ctx.font = '600 24px \"DM Mono\", ui-monospace, monospace';\n    ctx.letterSpacing = '0.28em';\n    const taglineW = Math.ceil(ctx.measureText(taglineText).width);\n\n    // Wrap dish to fit within blockMaxContentW\n    const dishText = dishEl.textContent;\n    ctx.font = '600 64px \"Playfair Display\", Georgia, serif';\n    ctx.letterSpacing = '0px';\n    const dishLines = wrapText(ctx, dishText, blockMaxContentW);\n    let dishMaxLineW = 0;\n    for (const line of dishLines) {\n      dishMaxLineW = Math.max(dishMaxLineW, ctx.measureText(line).width);\n    }\n    dishMaxLineW = Math.ceil(dishMaxLineW);\n\n    // Compute final block width: hug the wider of tagline / dish\n    const contentW = Math.max(taglineW, dishMaxLineW);\n    const blockW = Math.min(contentW + padX * 2, blockMaxW);\n\n    // Compute block height\n    const taglineLineH = 24;\n    const taglinePadBottom = 22; // CSS padding-bottom on tagline\n    const borderH = 2;\n    const gapAfterBorder = 22; // margin-bottom on tagline (after border)\n    const dishLineH = Math.round(64 * 1.08); // 69\n    const dishTotalH = dishLines.length * dishLineH;\n    const contentH = taglineLineH + taglinePadBottom + borderH + gapAfterBorder + dishTotalH;\n    const blockH = contentH + padTop + padBot;\n\n    const blockY = H - 110 - blockH;\n\n    // Draw block bg\n    ctx.fillStyle = BURGUNDY;\n    ctx.fillRect(blockLeft, blockY, blockW, blockH);\n\n    // Draw tagline (with 0.85 opacity over burgundy = approx faded cream)\n    ctx.save();\n    ctx.globalAlpha = 0.85;\n    ctx.fillStyle = CREAM;\n    ctx.font = '600 24px \"DM Mono\", ui-monospace, monospace';\n    ctx.letterSpacing = '0.28em';\n    ctx.textBaseline = 'top';\n    ctx.textAlign = 'left';\n    let cursorY = blockY + padTop;\n    ctx.fillText(taglineText, blockLeft + padX, cursorY);\n    ctx.restore();\n    cursorY += taglineLineH + taglinePadBottom;\n\n    // Border line below tagline\n    ctx.fillStyle = 'rgba(242,230,206,0.4)';\n    ctx.fillRect(blockLeft + padX, cursorY, contentW, borderH);\n    cursorY += borderH + gapAfterBorder;\n\n    // Dish (multi-line)\n    ctx.fillStyle = CREAM;\n    ctx.font = '600 64px \"Playfair Display\", Georgia, serif';\n    ctx.letterSpacing = '0px';\n    ctx.textBaseline = 'top';\n    ctx.textAlign = 'left';\n    for (const line of dishLines) {\n      ctx.fillText(line, blockLeft + padX, cursorY);\n      cursorY += dishLineH;\n    }\n\n    // === EXPORT PNG ===\n    const blob = await new Promise((resolve) =>\n      canvas.toBlob(resolve, 'image/png')\n    );\n    if (!blob) throw new Error('canvas.toBlob returned null');\n\n    // Trigger download\n    const url = URL.createObjectURL(blob);\n    const a = document.createElement('a');\n    const lesson = (lessonInput.value || '').replace(/\\D/g, '') || '00';\n    const opSlug = (opleidingInput.value || 'opleiding').toLowerCase()\n      .replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '').slice(0, 30) || 'opleiding';\n    const dishSlug = (dishInput.value || 'story').toLowerCase()\n      .replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '').slice(0, 30);\n    a.download = `${opSlug}-les-${lesson}-${dishSlug}.png`;\n    a.href = url;\n    document.body.appendChild(a);\n    a.click();\n    document.body.removeChild(a);\n    setTimeout(() => URL.revokeObjectURL(url), 1000);\n\n    showToast('PNG GEDOWNLOAD ✓');\n  } catch (err) {\n    console.error(err);\n    showToast('FOUT — PROBEER OPNIEUW');\n  } finally {\n    downloadBtn.disabled = false;\n    downloadBtn.textContent = '⬇  DOWNLOAD ALS PNG';\n  }\n}\ndownloadBtn.addEventListener('click', download);\n\nfunction showToast(msg) {\n  toast.textContent = msg;\n  toast.classList.add('show');\n  setTimeout(() => toast.classList.remove('show'), 2400);\n}\n\n// Init\nconst saved = loadSettings();\nif (saved.opleiding) opleidingInput.value = saved.opleiding;\nif (saved.lesson) lessonInput.value = saved.lesson;\nupdateOpleiding();\nupdateLesson();\nupdateDish();\nfitPreview();\n// Re-fit after fonts load (since layout may shift)\ndocument.fonts.ready.then(fitPreview);\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
